resample.desc=Resample a tag history Dataset to a fixed time interval.
resample.param.dataset=Ignition Dataset (must contain a Date timestamp column, e.g. t_stamp).
resample.param.intervalStr=Resampling interval: "1m", "5m", "15m", "30m", "1h", "4h", "1d".
resample.param.aggregation=Aggregation function: "mean", "min", "max", "sum", "first", "last".
resample.returns=Resampled Dataset at the new frequency.

interpolate.desc=Interpolate missing values in all numeric columns.
interpolate.param.dataset=Ignition Dataset.
interpolate.param.method=Interpolation method: "linear" (default), "forward" (last-observation-carried-forward), or "backward".
interpolate.returns=Dataset with missing values filled.

dropNulls.desc=Drop all rows where any numeric column contains a missing value.
dropNulls.param.dataset=Ignition Dataset.
dropNulls.returns=Dataset with incomplete rows removed.

fillNulls.desc=Replace missing values in a single column with a constant.
fillNulls.param.dataset=Ignition Dataset.
fillNulls.param.column=Column name.
fillNulls.param.fillValue=Replacement value.
fillNulls.returns=Dataset with missing values in the column replaced.

rollingMean.desc=Add a rolling mean column to the Dataset.
rollingMean.param.dataset=Ignition Dataset.
rollingMean.param.column=Numeric column to compute over.
rollingMean.param.window=Window size in rows.
rollingMean.returns=Original Dataset plus a new column named {column}_rollMean.

rollingStd.desc=Add a rolling standard deviation column to the Dataset.
rollingStd.param.dataset=Ignition Dataset.
rollingStd.param.column=Numeric column to compute over.
rollingStd.param.window=Window size in rows.
rollingStd.returns=Original Dataset plus a new column named {column}_rollStd.

rollingMin.desc=Add a rolling minimum column to the Dataset.
rollingMin.param.dataset=Ignition Dataset.
rollingMin.param.column=Numeric column to compute over.
rollingMin.param.window=Window size in rows.
rollingMin.returns=Original Dataset plus a new column named {column}_rollMin.

rollingMax.desc=Add a rolling maximum column to the Dataset.
rollingMax.param.dataset=Ignition Dataset.
rollingMax.param.column=Numeric column to compute over.
rollingMax.param.window=Window size in rows.
rollingMax.returns=Original Dataset plus a new column named {column}_rollMax.

describe.desc=Compute descriptive statistics for all numeric columns.
describe.param.dataset=Ignition Dataset.
describe.returns=Dataset with rows for count, mean, std, min, 25%, 50%, 75%, max.

correlate.desc=Compute the Pearson correlation matrix for all numeric columns.
correlate.param.dataset=Ignition Dataset.
correlate.returns=Dataset where the first column is the row label and the remaining columns are correlation coefficients.

normalize.desc=Normalize a column in a copy of the Dataset.
normalize.param.dataset=Ignition Dataset.
normalize.param.column=Column to normalize.
normalize.param.method=Normalization method: "minmax" (scale to [0, 1]) or "zscore" (mean=0, std=1).
normalize.returns=Copy of the Dataset with the specified column normalized.

detectAnomaliesZScore.desc=Detect anomalies using a Z-score threshold. Appends a boolean column named {column}_anomaly.
detectAnomaliesZScore.param.dataset=Ignition Dataset.
detectAnomaliesZScore.param.column=Numeric column to analyse.
detectAnomaliesZScore.param.threshold=Sigma threshold (2.0 = sensitive, 3.0 = standard, 4.0 = conservative).
detectAnomaliesZScore.returns=Dataset with an added {column}_anomaly boolean column.

detectAnomaliesIQR.desc=Detect anomalies using the Interquartile Range method (Tukey fences). Appends a boolean column named {column}_anomaly.
detectAnomaliesIQR.param.dataset=Ignition Dataset.
detectAnomaliesIQR.param.column=Numeric column to analyse.
detectAnomaliesIQR.param.fence=IQR multiplier (1.5 = mild outliers, 3.0 = extreme outliers).
detectAnomaliesIQR.returns=Dataset with an added {column}_anomaly boolean column.

detectAnomaliesEWMA.desc=Detect anomalies using an EWMA control chart. Suitable for slowly drifting processes where Z-score misses shifts. Appends a boolean column named {column}_anomaly.
detectAnomaliesEWMA.param.dataset=Ignition Dataset.
detectAnomaliesEWMA.param.column=Numeric column to analyse.
detectAnomaliesEWMA.param.lambda=EWMA smoothing factor (0 < lambda <= 1; typical: 0.2).
detectAnomaliesEWMA.param.threshold=Control limit in sigma units (typical: 3.0).
detectAnomaliesEWMA.returns=Dataset with an added {column}_anomaly boolean column.

forecast.desc=Forecast future values using Holt's double exponential smoothing (alpha=0.3, beta=0.1). Returns only the forecasted rows -- append to the original for a full historical + forecast view. Has no seasonal term; see docs/forecast-limitations.md before using on cyclical data.
forecast.param.dataset=Ignition Dataset (must have a timestamp column).
forecast.param.column=Numeric column to forecast.
forecast.param.periods=Number of future steps to generate.
forecast.param.intervalStr=Step size: "1m", "5m", "1h", "1d".
forecast.returns=Dataset with {periods} rows of forecasted timestamps and values.

forecastLinear.desc=Forecast using simple linear extrapolation (ordinary least squares trend line). Best for data with a clear monotonic trend and no complex seasonality.
forecastLinear.param.dataset=Ignition Dataset (must have a timestamp column).
forecastLinear.param.column=Numeric column to forecast.
forecastLinear.param.periods=Number of future steps to generate.
forecastLinear.param.intervalStr=Step size: "1m", "5m", "1h", "1d".
forecastLinear.returns=Dataset with {periods} rows of forecasted timestamps and values.

forecastHolt.desc=Forecast using Holt's double exponential smoothing with explicit smoothing parameters. Has no seasonal term; see docs/forecast-limitations.md before using on cyclical data.
forecastHolt.param.dataset=Ignition Dataset (must have a timestamp column).
forecastHolt.param.column=Numeric column to forecast.
forecastHolt.param.periods=Number of future steps to generate.
forecastHolt.param.intervalStr=Step size: "1m", "5m", "1h", "1d".
forecastHolt.param.alpha=Level smoothing factor (0 < alpha < 1; lower = smoother).
forecastHolt.param.beta=Trend smoothing factor (0 < beta < 1).
forecastHolt.returns=Dataset with {periods} rows of forecasted timestamps and values.

forecastHoltWinters.desc=Forecast using Holt-Winters triple exponential smoothing (level + trend + additive seasonal component). Use for data with a repeating seasonal/cyclical pattern (e.g. daily or weekly tag cycles) that forecastHolt/forecast cannot model.
forecastHoltWinters.param.dataset=Ignition Dataset (must have a timestamp column).
forecastHoltWinters.param.column=Numeric column to forecast.
forecastHoltWinters.param.periods=Number of future steps to generate.
forecastHoltWinters.param.intervalStr=Step size: "1m", "5m", "1h", "1d".
forecastHoltWinters.param.seasonalPeriods=Number of steps in one full seasonal cycle (e.g. 24 for hourly data with a daily cycle, 7 for daily data with a weekly cycle). Requires at least 2 full cycles of history.
forecastHoltWinters.param.alpha=Level smoothing factor (0 < alpha < 1).
forecastHoltWinters.param.beta=Trend smoothing factor (0 < beta < 1).
forecastHoltWinters.param.gamma=Seasonal smoothing factor (0 < gamma < 1).
forecastHoltWinters.returns=Dataset with {periods} rows of forecasted timestamps and values.

cluster.desc=Cluster rows into k groups using K-Means. Appends an integer column named "cluster" (values 0 to k-1). All specified columns must be numeric -- use dropNulls/fillNulls first.
cluster.param.dataset=Ignition Dataset.
cluster.param.columns=Feature columns to cluster on, e.g. ["Temperature", "Pressure"].
cluster.param.k=Number of clusters.
cluster.returns=Dataset with the original columns plus a "cluster" integer column.

pca.desc=Reduce dimensionality using Principal Component Analysis (PCA). Appends nComponents new columns named "PC_1".."PC_n" capturing the directions of maximum variance. Input columns are standardized (mean=0, unit variance) before decomposition.
pca.param.dataset=Ignition Dataset.
pca.param.columns=Feature columns to decompose (must all be numeric).
pca.param.nComponents=Number of principal components to retain (1 <= n <= columns.length).
pca.returns=Dataset with original columns plus "PC_1".."PC_n" columns.

toCSV.desc=Serialize the Dataset to a CSV string. Useful for writing to the file system or returning to a report.
toCSV.param.dataset=Ignition Dataset.
toCSV.returns=CSV-formatted string.

toJSON.desc=Serialize the Dataset to a JSON array-of-objects string.
toJSON.param.dataset=Ignition Dataset.
toJSON.returns=JSON-formatted string.

shape.desc=Return the shape of a Dataset.
shape.param.dataset=Ignition Dataset.
shape.returns=Two-element integer array: [rows, columns].

columnNames.desc=Return the column names of the Dataset.
columnNames.param.dataset=Ignition Dataset.
columnNames.returns=String array of column names.
